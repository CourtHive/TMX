name: release-please

# release-please maintains a perpetual release PR on main that
# accumulates conventional commits since the last release. Merging
# the PR creates a GitHub release + a `v{version}` tag and bumps
# package.json + CHANGELOG.md.
#
# TMX is private (not published to npm) so no downstream npm-publish
# workflow needs to fire. We still mint a GitHub App token for
# parity with factory / courthive-components / pdf-factory — same
# `courthive-release-bot` App, same secrets, same operator habits.
# A plain `secrets.GITHUB_TOKEN` would also work today (no chained
# workflows to gate against the GITHUB_TOKEN recursion rule).
#
# Required repo secrets:
#   RELEASE_BOT_CLIENT_ID      — App Client ID (string, e.g. "Iv23li...")
#   RELEASE_BOT_PRIVATE_KEY    — PEM contents (BEGIN/END markers included)
#
# The App needs Contents: Write + Pull requests: Write on this repo.
#
# Day-to-day flow:
#   1. Land feature/fix PRs on main with conventional commits
#      (feat:, fix:, chore:, docs:, etc.)
#   2. The bot updates a `chore: release X.Y.Z` PR automatically
#   3. Merge the release PR → GitHub release + tag are created
#      and package.json is bumped.
#
# To force a specific version, edit `.release-please-manifest.json`
# on main directly.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # Tests gate the release. release-please below depends on this job, so
  # a red test board on main blocks the perpetual release PR from
  # updating — the same pattern factory uses (tests gate npm publish).
  # `ci.yml` still runs `pnpm lint` on every push / PR; this job is the
  # release-time hurdle, not a duplicate of that.
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # Strip link: overrides — same defensive scrub ci.yml runs (see
      # MEMORY.md > feedback_ci_strip_link_overrides_in_workspace_yaml).
      - name: 'Strip link: overrides for CI'
        run: |
          node -e "
          const fs = require('fs');
          if (fs.existsSync('pnpm-workspace.yaml')) {
            const before = fs.readFileSync('pnpm-workspace.yaml', 'utf8');
            const after = before.split('\n').filter(line => !/:\s*link:\S+\s*\$/.test(line)).join('\n');
            if (after !== before) fs.writeFileSync('pnpm-workspace.yaml', after);
          }
          "
          rm -f pnpm-lock.yaml

      - run: pnpm install
      - run: pnpm lint
      - run: pnpm check-types
      - run: pnpm test --run

  release-please:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
