name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      # pnpm-workspace.yaml `link:` overrides win over package.json pins,
      # and the GitHub runner has no sibling clones at ../factory etc., so
      # any `link:` override would produce a dangling symlink. Lint
      # tolerates that today, but check-types / test / build would not —
      # strip the link: lines defensively so this stays green if those
      # steps are added later. Mirrors courthive-rankings 340ab59.
      - name: 'Strip link: overrides for CI'
        run: |
          node -e "
          const fs = require('fs');
          if (fs.existsSync('pnpm-workspace.yaml')) {
            const before = fs.readFileSync('pnpm-workspace.yaml', 'utf8');
            const after = before.split('\n').filter(line => !/:\s*link:\S+\s*\$/.test(line)).join('\n');
            if (after !== before) fs.writeFileSync('pnpm-workspace.yaml', after);
          }
          "
          rm -f pnpm-lock.yaml

      - run: pnpm install
      - run: pnpm lint

      # Deterministic AST attribute-typo / schema-divergence gate. Fails only on
      # a PROP-class attribute name not in the triaged allow-list — i.e. a NEW
      # silent typo (matchUp.rondPosition, etc.). Baseline triaged 2026-07-05.
      - name: attr-audit
        run: pnpm attr-audit --ci
