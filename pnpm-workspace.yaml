packages:
  - .

# Disable pnpm v11's supply-chain minimumReleaseAge policy. Recent
# CourtHive-owned packages (factory, provider-config, i18n) often fall
# within the policy's freshness window but are overridden to local
# `link:../` paths below — the lockfile entries are advisory, not
# fetched. The policy false-positives on those and blocks install.
minimumReleaseAge: 0

allowBuilds:
  electron-winstaller: true
  esbuild: true

ignoredBuiltDependencies:
  - core-js
  - cypress
  - electron
  - electron-winstaller
  - esbuild

overrides:
  '@courthive/provider-config': link:../provider-config
  '@courthive/scoring-visualizations': link:../scoringVisualizations
  '@xmldom/xmldom': ^0.9.0
  'brace-expansion@1': ^5.0.0
  'brace-expansion@2': ^5.0.0
  'brace-expansion@>=4 <5.0.5': ^5.0.5
  courthive-components: link:../courthive-components
  follow-redirects: ^1.16.0
  pdf-factory: link:../pdf-factory
  picomatch: ^4.0.4
  socket.io-parser: ^4.2.6
  tods-competition-factory: link:../factory
  undici: ^8.0.0
