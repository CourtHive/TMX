packages:
  - .

# Keep pnpm v11's supply-chain minimumReleaseAge policy active for
# third-party packages (1440 minutes = 1 day floor), but exempt every
# CourtHive package we publish ourselves so cross-repo release cascades
# don't get blocked by their own freshness. CourtHive packages are also
# `link:../` overridden below — the lockfile entries are advisory, not
# fetched — but the exempt-list makes the install pass even when a fresh
# install reads the lockfile without honoring the link override.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - 'tods-competition-factory'
  - 'courthive-*'
  - '@courthive/*'
  - 'pdf-factory'
  - 'scoring-visualizations'
  - 'tabulator-scorecards'

# pnpm v11 requires every transitive package with a lifecycle script
# to be explicitly approved (true) or denied (false) here. Packages
# left out trigger ERR_PNPM_IGNORED_BUILDS on fresh installs.
# `--frozen-lockfile` skips this gate, which is why the previous
# config (`allowBuilds:` with only positive entries, plus a
# non-recognized `ignoredBuiltDependencies:` array) appeared to work.
allowBuilds:
  esbuild: true             # downloads platform-specific binary
  electron-winstaller: true # Windows installer build
  core-js: false            # polyfills — funding banner only, skip
  cypress: false            # large browser binary; e2e via Playwright instead
  electron: false           # ~250MB binary; only needed for desktop mode

overrides:
  '@courthive/provider-config': link:../provider-config
  '@courthive/scoring-visualizations': link:../scoringVisualizations
  '@xmldom/xmldom': ^0.9.0
  'brace-expansion@1': ^5.0.0
  'brace-expansion@2': ^5.0.0
  'brace-expansion@>=4 <5.0.5': ^5.0.5
  courthive-components: link:../courthive-components
  follow-redirects: ^1.16.0
  pdf-factory: link:../pdf-factory
  picomatch: ^4.0.4
  socket.io-parser: ^4.2.6
  tods-competition-factory: link:../factory
  undici: ^8.0.0
  ws: ^8.20.1
